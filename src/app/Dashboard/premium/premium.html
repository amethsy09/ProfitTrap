<div class="p-6">

  <h2 class="text-2xl font-bold mb-6">
    Espace Premium - Statistiques
  </h2>

  <div class="h-[400px] bg-white rounded-xl shadow p-4 relative">

    @defer (on viewport) {

      <canvas #chartCanvas class="absolute inset-0"></canvas>

    } @placeholder {

      <div class="text-gray-500 text-center">
        Faites défiler pour charger les statistiques...
      </div>

    } @loading {

      <div class="text-blue-500 text-center">
        Chargement du graphique...
      </div>

    }

  </div>

</div>
