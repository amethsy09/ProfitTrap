<div class="p-6 bg-gray-100 min-h-screen">

  <h2 class="text-2xl font-bold mb-6">
    Planning des cours
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    @for (cours of coursAvecStatut(); track cours.id) {

      <div class="bg-white p-5 rounded-xl shadow">

        <!-- Nom -->
        <h3 class="text-xl font-bold text-gray-800">
          {{ cours.nom }}
        </h3>

        <!-- Places -->
        <p class="text-gray-600 mt-2">
          Réservé : {{ cours.reserves }} / {{ cours.capacite }}
        </p>

        <!-- Barre progression -->
        <div class="w-full bg-gray-200 rounded-full h-2 mt-3">
          <div
            class="bg-green-500 h-2 rounded-full"
            [style.width.%]="(cours.reserves / cours.capacite) * 100"
          ></div>
        </div>

        <!-- Bouton -->
        <button
          class="mt-4 w-full px-4 py-2 rounded-lg text-white transition"
          [disabled]="cours.complet"
          [ngClass]="cours.complet
            ? 'bg-red-400 cursor-not-allowed'
            : 'bg-blue-600 hover:bg-blue-700'"
          (click)="reserver(cours.id)"
        >
          {{ cours.complet ? 'Complet' : 'Réserver' }}
        </button>

      </div>

    }

  </div>
</div>
